{% extends "base.html" %}
{% block title %}Writing — {{ name }}{% endblock %}

{% block body %}
<main class="relative z-10 min-h-screen flex items-center justify-center px-6 py-20">
  <div style="width:100%;max-width:520px;text-align:center;">
    <div class="glass" style="padding:48px 40px;">
      <div style="width:52px;height:52px;border-radius:14px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 24px;">✍</div>
      <p class="kicker" style="justify-content:center;margin-bottom:12px;">Writing</p>
      <h1 style="font-size:26px;font-weight:800;color:#F3F4F6;letter-spacing:-.02em;margin-bottom:12px;">Writing previews live on the homepage.</h1>
      <p style="font-size:14px;color:#6B7280;line-height:1.75;margin-bottom:28px;">Add Blog, LinkedIn or portfolio update links from the dashboard and keep the public site clean and professional.</p>
      <a href="{% url 'home' %}#posts" class="btn-primary">View Writing ↗</a>
    </div>
  </div>
</main>
{% endblock %}
